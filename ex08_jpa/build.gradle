plugins {
  id 'java'
  id 'org.springframework.boot' version '3.5.15'
  id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

repositories {
  mavenCentral()
}

dependencies {

  // Spring Data JPA 없이 최소 의존으로 테스트 진행

  // Source: https://mvnrepository.com/artifact/org.hibernate/hibernate-core
  implementation 'org.hibernate:hibernate-core:6.4.10.Final'

  // Source: https://mvnrepository.com/artifact/jakarta.persistence/jakarta.persistence-api
  implementation 'jakarta.persistence:jakarta.persistence-api:3.1.0'

  implementation 'org.springframework.boot:spring-boot-starter-web'
  compileOnly 'org.projectlombok:lombok'
  runtimeOnly 'com.mysql:mysql-connector-j'
  annotationProcessor 'org.projectlombok:lombok'
  testImplementation 'org.springframework.boot:spring-boot-starter-test'
  testCompileOnly 'org.projectlombok:lombok'
  testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
  testAnnotationProcessor 'org.projectlombok:lombok'
}

tasks.named('test') {
  useJUnitPlatform()
}